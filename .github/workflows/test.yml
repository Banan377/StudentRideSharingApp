name: Spring Boot CI

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      DB_URL: jdbc:mysql://localhost:3306/testdb
      DB_USERNAME: root
      DB_PASSWORD: password
      GOOGLE_MAPS_API_KEY: dummy-key-for-testing

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testdb
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Give Maven Permission
        run: chmod +x mvnw

      - name: Run Tests
        run: ./mvnw test