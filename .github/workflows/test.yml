name: Spring Boot CI

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Give Maven Permission
        run: chmod +x mvnw

      - name: Run Tests
        run: ./mvnw test