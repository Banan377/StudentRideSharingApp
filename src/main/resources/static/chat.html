

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محادثة الرحلة</title>
    <link rel="stylesheet" href="chat.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <button class="back-btn" onclick="goBack()">← رجوع</button>
            <span id="chatTitle">محادثة الرحلة</span>
        </div>
        
        <div class="messages" id="messagesContainer">
            <!-- الرسائل تظهر هنا -->
        </div>
        
        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>

       <script src="js/chat.js"></script>

</body>
</html>
