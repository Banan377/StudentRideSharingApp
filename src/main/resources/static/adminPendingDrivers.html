<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <title>طلبات السائقين</title>
  <link rel="stylesheet" href="passenger.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .admin-title {
      color: #265262;
      font-size: 22px;
      font-weight: 600;
    }

    .requests-wrapper {
      max-width: 1000px;
      margin: 20px auto 30px;
    }

    .request-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 18px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      border: 1px solid #edf0f2;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .request-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .request-name {
      font-size: 18px;
      font-weight: 600;
      color: #265262;
    }

    .request-email {
      font-size: 13px;
      color: #666;
    }

    .badge-pending {
      background: #fff7e6;
      color: #b9770e;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .badge-pending i {
      font-size: 12px;
    }

    .request-body {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      font-size: 13px;
      color: #444;
    }

    .info-item {
      background: #f8fafc;
      border-radius: 10px;
      padding: 8px 10px;
    }

    .info-label {
      font-size: 11px;
      color: #777;
      margin-bottom: 2px;
    }

    .info-value {
      font-size: 13px;
      font-weight: 600;
      color: #333;
    }

    .request-files {
      font-size: 13px;
      margin-top: 5px;
    }

    .file-link {
      color: #265262;
      text-decoration: underline;
      margin-left: 10px;
    }

    .request-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 10px;
    }

    .btn-approve {
      background: #265262;
      color: white;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
    }

    .btn-reject {
      background: #c0392b;
      color: white;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
    }

    /* ===== Mobile-only safe overrides (max-width:768px) ===== */
    @media (max-width: 768px) {
      .requests-wrapper {
        padding: 0.75rem !important;
      }

      .request-card {
        padding: 12px !important;
        box-shadow: none !important;
      }

      .request-body {
        grid-template-columns: 1fr !important;
      }

      .request-actions {
        justify-content: center !important;
        gap: 0.6rem !important;
      }

      .sidebar .menue a span {
        display: none !important;
      }

      .btn-approve,
      .btn-reject {
        padding: 10px 12px !important;
        min-height: 44px !important;
      }
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo"></div>
    <ul class="menue">
      <li><a href="adminDashboard.html"><i class="fas fa-chart-line"></i><span>لوحة التحكم</span></a></li>
      <li class="active"><a href="adminPendingDrivers.html"><i class="fas fa-id-card"></i><span>طلبات
            السائقين</span></a></li>
      <li><a href="adminUsers.html"><i class="fas fa-users"></i><span>إدارة المستخدمين</span></a></li>
      <li><a href="#"><i class="fas fa-school"></i><span>أنشطة الجامعة</span></a></li>
    </ul>
  </div>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- Full-width header outside container -->
    <div class="top-bar">
      <h2 class="admin-title" style="margin-right:20px;">طلبات السائقين</h2>

      <div class="profile-section">
        <button onclick="toggleProfileDropdown()" class="profile-btn">
          <i class="fas fa-user-circle"></i>
        </button>
        <div id="profile-dropdown" class="dropdown-menu hidden">
          <ul>
            <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>تسجيل الخروج</span></a></li>
          </ul>
        </div>
      </div>
    </div>

    <section class="requests-wrapper">
      <div id="requestsContainer"></div>
    </section>

  </main>

  <script>

  </script>
  <script src="js/logout.js"></script>
  <script src="js/adminPendingDrivers.js"></script>



</body>

</html>
