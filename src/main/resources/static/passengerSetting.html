<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <title>إعدادات الراكب</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: #ccddea;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .header {
      background: #265262;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 22px;
      margin: 0;
    }

    .form-content {
      padding: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      background: white;
      transition: border-color 0.3s ease;
    }

    input:focus {
      border-color: #487788;
      outline: none;
    }

    .readonly-field {
      background-color: #f9fbfb;
      color: #666;
      cursor: not-allowed;
      border-color: #e8f4f8;
    }

    .field-note {
      font-size: 12px;
      color: #888;
      margin-top: 5px;
      font-style: italic;
    }

    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 5px;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: normal;
      cursor: pointer;
    }

    .radio-group input[type="radio"]:disabled+span {
      color: #666;
      cursor: not-allowed;
    }

    .section-title {
      background: #f3f6f7;
      padding: 12px 20px;
      margin: 30px 0 20px 0;
      border-right: 4px solid #487788;
      font-weight: 600;
      color: #265262;
      font-size: 16px;
      border-radius: 8px;
    }

    .form-actions {
      display: flex;
      gap: 15px;
      margin-top: 40px;
      padding-top: 25px;
      border-top: 2px solid #f0f0f0;
    }

    .btn {
      padding: 14px 25px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      flex: 1;
      text-align: center;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .submit-btn {
      background: #487788;
      color: white;
    }

    .submit-btn:hover {
      background: #265262;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(38, 82, 98, 0.3);
    }

    .cancel-btn {
      background: #6c757d;
      color: white;
    }

    .cancel-btn:hover {
      background: #5a6268;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(108, 117, 125, 0.3);
    }

    .password-toggle {
      color: #487788;
      text-decoration: none;
      font-size: 13px;
      margin-top: 8px;
      display: inline-block;
      font-weight: 500;
    }

    .password-toggle:hover {
      text-decoration: underline;
    }

    .emergency-section {
      background: #fff9f9;
      padding: 20px;
      border-radius: 10px;
      border: 2px solid #ffe6e6;
      margin-bottom: 20px;
    }

    .password-section {
      background: #f9fbfb;
      padding: 20px;
      border-radius: 10px;
      border: 2px solid #e8f4f8;
      margin-bottom: 20px;
    }

    #saveBtn:disabled {
      background: #cccccc;
      color: #888888;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    /* ===== Mobile-only safe overrides (max-width:768px) ===== */
    @media (max-width: 768px) {
      html {
        font-size: 15px;
      }

      body {
        padding: 0 0.5rem;
      }

      .container {
        width: 100% !important;
        max-width: 100% !important;
        padding: 1rem !important;
        box-shadow: none !important;
      }

      .form-content {
        padding: 1rem !important;
      }

      .form-actions {
        flex-direction: column !important;
        gap: 0.6rem !important;
      }

      .radio-group {
        flex-direction: column !important;
        gap: 0.5rem !important;
      }

      .btn {
        padding: 12px !important;
        min-height: 44px !important;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- الهيدر -->
    <div class="header">
      <h1><i class="fas fa-cog"></i> إعدادات الحساب - الراكب</h1>
    </div>

    <!-- محتوى النموذج -->
    <div class="form-content">
      <form id="passengerSettingsForm">
        <!-- المعلومات الأساسية -->
        <div class="section-title">المعلومات الشخصية</div>

        <div class="form-group">
          <label for="firstName">الاسم الأول</label>
          <input type="text" id="firstName" class="readonly-field" readonly>
          <div class="field-note">لا يمكن تعديل الاسم الأول</div>
        </div>

        <div class="form-group">
          <label for="lastName">الاسم الأخير</label>
          <input type="text" id="lastName" class="readonly-field" readonly>
          <div class="field-note">لا يمكن تعديل الاسم الأخير</div>
        </div>

        <div class="form-group">
          <label for="email">البريد الإلكتروني الجامعي</label>
          <input type="email" id="email" class="readonly-field" readonly>
          <div class="field-note">لا يمكن تعديل البريد الإلكتروني</div>
        </div>

        <div class="form-group">
          <label for="college">الكلية</label>
          <input type="text" id="college">
        </div>

        <div class="form-group">
          <label>الجنس</label>
          <div class="radio-group">
            <label>
              <input type="radio" name="gender" value="male" disabled>
              <span>ذكر</span>
            </label>
            <label>
              <input type="radio" name="gender" value="female" checked disabled>
              <span>أنثى</span>
            </label>
          </div>
          <div class="field-note">لا يمكن تعديل الجنس</div>
        </div>

        <!-- كلمة المرور -->
        <div class="password-section">
          <div class="section-title">الأمان</div>

          <div class="form-group">
            <label for="currentPassword">تغيير كلمة المرور</label>
            <a href="#" onclick="startPasswordChange()" class="password-toggle">ترغب بتغيير كلمة المرور؟</a>
          </div>



          <!-- بيانات الطوارئ -->
          <div class="section-title">بيانات الطوارئ</div>
          <div class="emergency-section">
            <div class="form-group">
              <label for="emergency1">رقم هاتف الطوارئ</label>
              <input type="tel" id="emergency1" required pattern="05[0-9]{8}" maxlength="10">
            </div>

            <div class="form-group">
              <label for="emergency2">رقم هاتف إضافي (اختياري)</label>
              <input type="tel" id="emergency2" pattern="05[0-9]{8}" maxlength="10">
            </div>
          </div>

          <!-- أزرار -->
          <div class="form-actions">
            <a href="passengerRides.html" class="btn cancel-btn">إلغاء</a>
            <button id="saveBtn" type="submit" class="btn submit-btn" disabled>حفظ التغييرات</button>
          </div>
      </form>
    </div>
  </div>

  <script src="js/passengerSetting.js"></script>

</body>

</html>
